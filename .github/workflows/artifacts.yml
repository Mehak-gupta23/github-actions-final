name: Artifacts Demo

on:
  workflow_dispatch:

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Create a file
        run: echo "Hello, this file is saved as an artifact" > message.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: message.txt

  use-file:
    runs-on: ubuntu-latest
    needs: create-file

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact

      - name: Read file
        run: cat message.txt
